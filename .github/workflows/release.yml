name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build add-on zip
        shell: bash
        run: |
          mkdir -p dist
          python - <<'PY'
import os
import zipfile

root = "simple_lip_sync"
output = os.path.join("dist", os.environ["ZIP_NAME"])
excluded_dirs = {"__pycache__"}
with zipfile.ZipFile(output, "w", zipfile.ZIP_DEFLATED) as archive:
    for current_root, dirs, files in os.walk(root):
        dirs[:] = [name for name in dirs if name not in excluded_dirs]
        for file_name in files:
            if file_name.endswith((".pyc", ".pyo")):
                continue
            path = os.path.join(current_root, file_name)
            archive.write(path, path)
PY
        env:
          ZIP_NAME: simple_lip_sync-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simple_lip_sync-${{ steps.version.outputs.version }}.zip
