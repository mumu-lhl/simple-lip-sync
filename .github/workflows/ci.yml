name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Ruff
        run: uv run --with ruff ruff check simple_lip_sync tests .github/scripts

      - name: Python tests
        run: python -m unittest discover -s tests

      - name: Bandit
        run: uv run --with bandit bandit -r simple_lip_sync .github/scripts
